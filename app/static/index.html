<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Personal RAG</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3248;
    --accent: #6c63ff;
    --accent-hover: #574fd6;
    --text: #e2e4ef;
    --muted: #7b7f9e;
    --success: #3dd68c;
    --error: #ff6b6b;
    --radius: 10px;
    --font: 'Inter', system-ui, -apple-system, sans-serif;
    --drawer-width: 360px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    padding: 0 24px;
    height: 52px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 10;
    position: relative;
  }

  header h1 {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #doc-count {
    font-size: 11px;
    color: var(--muted);
  }

  .btn-icon {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 7px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    font-family: var(--font);
  }
  .btn-icon:hover { border-color: var(--accent); background: #6c63ff18; }
  .btn-icon svg { width: 15px; height: 15px; }

  /* ── Layout ── */
  .layout {
    display: flex;
    flex: 1;
    height: calc(100vh - 52px);
    overflow: hidden;
    position: relative;
  }

  /* ── Left sidebar (ingest) ── */
  .sidebar {
    width: 290px;
    min-width: 290px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    padding: 20px;
    gap: 12px;
  }

  .sidebar h2 {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 2px;
  }

  /* Drop zone */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 14px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
    background: #6c63ff11;
  }
  .drop-zone p { color: var(--muted); font-size: 12px; }
  .drop-zone p span { color: var(--accent); }
  .drop-zone .file-name {
    color: var(--text);
    font-size: 11px;
    margin-top: 5px;
    word-break: break-all;
  }

  /* Form elements */
  .form-row { display: flex; flex-direction: column; gap: 4px; }

  label {
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
  }
  label .req { color: var(--accent); margin-left: 2px; }

  select, input[type="text"], input[type="number"], textarea.field {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 12px;
    padding: 7px 10px;
    outline: none;
    font-family: var(--font);
    transition: border-color 0.2s;
  }
  select:focus, input:focus, textarea.field:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }

  textarea.field {
    resize: vertical;
    min-height: 60px;
    max-height: 140px;
    line-height: 1.5;
  }

  .form-row-half {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  /* Buttons */
  button { font-family: var(--font); cursor: pointer; border: none; border-radius: 6px; font-weight: 500; transition: background 0.15s, opacity 0.15s; }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    font-size: 12px;
    padding: 8px 16px;
    width: 100%;
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .ingest-status {
    font-size: 11px;
    border-radius: 6px;
    padding: 7px 10px;
    display: none;
  }
  .ingest-status.success { background: #3dd68c18; color: var(--success); border: 1px solid #3dd68c33; display: block; }
  .ingest-status.error   { background: #ff6b6b18; color: var(--error);   border: 1px solid #ff6b6b33; display: block; }

  /* ── Main chat area ── */
  .main {
    flex: 1;
    min-width: 0;
    min-height: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .chat-history {
    flex: 1;
    overflow-y: auto;
    padding: 28px 36px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    min-height: 0;
  }

  .welcome {
    text-align: center;
    margin: auto;
    max-width: 440px;
  }
  .welcome h2 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #a89eff, #6c63ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .welcome p { color: var(--muted); font-size: 13px; line-height: 1.6; }

  .message { display: flex; flex-direction: column; gap: 6px; }
  .message .bubble-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    padding: 0 2px;
  }

  .bubble {
    padding: 14px 18px;
    border-radius: var(--radius);
    line-height: 1.65;
    font-size: 13px;
    max-width: 820px;
  }
  .bubble.question {
    background: var(--surface2);
    border: 1px solid var(--border);
    align-self: flex-end;
  }
  .bubble.answer {
    background: var(--surface);
    border: 1px solid var(--border);
    align-self: flex-start;
    white-space: pre-wrap;
  }

  .sources-used { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .source-chip {
    font-size: 10px;
    padding: 3px 9px;
    border-radius: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .source-chip .sim { color: var(--accent); margin-left: 4px; }

  /* ── Query bar ── */
  .query-bar {
    padding: 16px 28px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .query-bar textarea {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 13px;
    padding: 11px 14px;
    outline: none;
    font-family: var(--font);
    resize: none;
    line-height: 1.5;
    min-height: 44px;
    max-height: 140px;
    transition: border-color 0.2s;
  }
  .query-bar textarea:focus { border-color: var(--accent); }
  .query-bar textarea::placeholder { color: var(--muted); }

  .btn-send {
    background: var(--accent);
    color: #fff;
    width: 44px;
    height: 44px;
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .btn-send:hover { background: var(--accent-hover); }
  .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-send svg { width: 16px; height: 16px; }

  /* ── Loading dots ── */
  .loading { display: flex; gap: 5px; padding: 14px 18px; align-items: center; }
  .loading span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent); opacity: 0.4;
    animation: bounce 1.2s infinite ease-in-out;
  }
  .loading span:nth-child(2) { animation-delay: 0.2s; }
  .loading span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  /* ── Right drawer (documents) ── */
  .drawer-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 40;
    opacity: 0;
    transition: opacity 0.25s;
  }
  .drawer-overlay.open { display: block; opacity: 1; }

  .drawer {
    position: fixed;
    top: 0;
    right: 0;
    width: var(--drawer-width);
    height: 100vh;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 50;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .drawer.open { transform: translateX(0); }

  .drawer-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .drawer-header h2 {
    font-size: 13px;
    font-weight: 600;
  }
  .drawer-close {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 4px;
    border-radius: 5px;
    display: flex;
    align-items: center;
    transition: color 0.15s;
  }
  .drawer-close:hover { color: var(--text); }
  .drawer-close svg { width: 16px; height: 16px; }

  .drawer-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .source-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
  }
  .source-item .name {
    font-size: 12px;
    font-weight: 500;
    word-break: break-all;
    margin-bottom: 6px;
  }
  .source-item .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .tag.type { border-color: #6c63ff44; color: #a89eff; }
  .tag.lang { border-color: #3dd68c44; color: #3dd68c; }
  .tag.year { border-color: #ff9f4344; color: #ff9f43; }

  .source-item .desc {
    color: var(--muted);
    font-size: 11px;
    margin-top: 7px;
    line-height: 1.5;
  }

  .empty-sources {
    color: var(--muted);
    font-size: 12px;
    text-align: center;
    padding: 32px 0;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
</style>
</head>
<body>

<header>
  <h1>Personal RAG</h1>
  <div class="header-right">
    <span id="doc-count"></span>
    <button class="btn-icon" onclick="openDrawer()" title="View ingested documents">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
      </svg>
    </button>
  </div>
</header>

<div class="layout">

  <!-- ── Left sidebar (ingest only) ── -->
  <aside class="sidebar">
    <h2>Add Document</h2>

    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <p>Drop a file or <span>browse</span></p>
      <p class="file-name" id="file-name-display"></p>
    </div>
    <input type="file" id="file-input" accept=".pdf,.txt,.docx" style="display:none"/>

    <div class="form-row">
      <label>Type <span class="req">*</span></label>
      <select id="doc-type">
        <option value="resume">Resume</option>
        <option value="internship_report">Internship Report</option>
        <option value="personal_bio">Personal Bio</option>
      </select>
    </div>

    <div class="form-row-half">
      <div class="form-row">
        <label>Language</label>
        <input type="text" id="doc-lang" placeholder="en, fr…" />
      </div>
      <div class="form-row">
        <label>Year</label>
        <input type="number" id="doc-year" placeholder="2024" />
      </div>
    </div>

    <div class="form-row">
      <label>Company</label>
      <input type="text" id="doc-company" placeholder="Airbus, KPMG…" />
    </div>

    <div class="form-row">
      <label>Description</label>
      <textarea class="field" id="doc-desc" placeholder="Describe this document — its purpose, context, time period…"></textarea>
    </div>

    <button class="btn-primary" id="ingest-btn" onclick="ingestFile()">Upload &amp; Ingest</button>
    <div class="ingest-status" id="ingest-status"></div>
  </aside>

  <!-- ── Main chat ── -->
  <main class="main">
    <div class="chat-history" id="chat-history">
      <div class="welcome" id="welcome">
        <h2>Ask me anything</h2>
        <p>Upload your documents on the left, then ask questions here. I'll answer based on what's in your files.</p>
      </div>
    </div>

    <div class="query-bar">
      <textarea
        id="query-input"
        placeholder="Ask a question about your documents…"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="btn-send" id="send-btn" onclick="sendQuery()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </main>
</div>

<!-- ── Right drawer ── -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <h2>Ingested Documents</h2>
    <button class="drawer-close" onclick="closeDrawer()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <div class="drawer-body" id="drawer-body">
    <p class="empty-sources">No documents yet</p>
  </div>
</div>

<script>
  // ── Drawer ──
  function openDrawer() {
    loadSources();
    document.getElementById('drawer').classList.add('open');
    document.getElementById('drawer-overlay').classList.add('open');
  }
  function closeDrawer() {
    document.getElementById('drawer').classList.remove('open');
    document.getElementById('drawer-overlay').classList.remove('open');
  }

  // ── Auto-resize textarea ──
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuery(); }
  }

  // ── File drag & drop ──
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files[0]) { fileInput.files = e.dataTransfer.files; updateFileName(); }
  });
  fileInput.addEventListener('change', updateFileName);

  function updateFileName() {
    const f = fileInput.files[0];
    document.getElementById('file-name-display').textContent = f ? f.name : '';
  }

  // ── Ingest ──
  async function ingestFile() {
    const file = fileInput.files[0];
    if (!file) { showIngestStatus('Select a file first', 'error'); return; }

    const formData = new FormData();
    formData.append('file', file);
    formData.append('document_type', document.getElementById('doc-type').value);
    const lang    = document.getElementById('doc-lang').value.trim();
    const year    = document.getElementById('doc-year').value.trim();
    const company = document.getElementById('doc-company').value.trim();
    const desc    = document.getElementById('doc-desc').value.trim();
    if (lang)    formData.append('language', lang);
    if (year)    formData.append('year', year);
    if (company) formData.append('company', company);
    if (desc)    formData.append('description', desc);

    const btn = document.getElementById('ingest-btn');
    btn.disabled = true;
    btn.textContent = 'Ingesting…';

    try {
      const res = await fetch('/ingest', { method: 'POST', body: formData });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Unknown error');
      showIngestStatus(`Done — ${data.chunks_ingested} chunks stored`, 'success');
      fileInput.value = '';
      document.getElementById('file-name-display').textContent = '';
      updateDocCount();
    } catch (e) {
      showIngestStatus(e.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Upload & Ingest';
    }
  }

  function showIngestStatus(msg, type) {
    const el = document.getElementById('ingest-status');
    el.textContent = msg;
    el.className = 'ingest-status ' + type;
  }

  // ── Sources ──
  async function loadSources() {
    const res = await fetch('/sources');
    const data = await res.json();
    const body = document.getElementById('drawer-body');

    if (data.total === 0) {
      body.innerHTML = '<p class="empty-sources">No documents ingested yet</p>';
      return;
    }

    body.innerHTML = data.documents.map(doc => {
      const tags = [];
      if (doc.document_type) tags.push(`<span class="tag type">${doc.document_type.replace(/_/g, ' ')}</span>`);
      if (doc.language)      tags.push(`<span class="tag lang">${doc.language}</span>`);
      if (doc.year)          tags.push(`<span class="tag year">${doc.year}</span>`);
      if (doc.company)       tags.push(`<span class="tag">${doc.company}</span>`);
      return `
        <div class="source-item">
          <div class="name">${escapeHtml(doc.source)}</div>
          <div class="tags">${tags.join('')}</div>
          ${doc.description ? `<div class="desc">${escapeHtml(doc.description)}</div>` : ''}
        </div>`;
    }).join('');
  }

  async function updateDocCount() {
    const res = await fetch('/sources');
    const data = await res.json();
    document.getElementById('doc-count').textContent =
      data.total ? `${data.total} doc${data.total !== 1 ? 's' : ''}` : '';
  }

  // ── Conversation history ──
  const conversationHistory = [];

  // ── Query ──
  async function sendQuery() {
    const input = document.getElementById('query-input');
    const question = input.value.trim();
    if (!question) return;

    document.getElementById('welcome')?.remove();

    const chatEl = document.getElementById('chat-history');
    input.value = '';
    input.style.height = 'auto';
    document.getElementById('send-btn').disabled = true;

    chatEl.innerHTML += `
      <div class="message">
        <div class="bubble-label">You</div>
        <div class="bubble question">${escapeHtml(question)}</div>
      </div>`;

    const loadingId = 'loading-' + Date.now();
    chatEl.innerHTML += `
      <div id="${loadingId}" class="loading">
        <span></span><span></span><span></span>
      </div>`;
    chatEl.scrollTop = chatEl.scrollHeight;

    try {
      const res = await fetch('/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, history: conversationHistory }),
      });
      const data = await res.json();
      document.getElementById(loadingId)?.remove();
      if (!res.ok) throw new Error(data.detail || 'Unknown error');

      // Store this turn in history
      conversationHistory.push({ role: 'user', content: question });
      conversationHistory.push({ role: 'assistant', content: data.answer });

      const chips = (data.sources || []).map(s =>
        `<span class="source-chip">${escapeHtml(s.source)} <span class="sim">${(s.similarity * 100).toFixed(0)}%</span></span>`
      ).join('');

      chatEl.innerHTML += `
        <div class="message">
          <div class="bubble-label">Answer</div>
          <div class="bubble answer">${escapeHtml(data.answer)}${chips ? `<div class="sources-used">${chips}</div>` : ''}</div>
        </div>`;
    } catch (e) {
      document.getElementById(loadingId)?.remove();
      chatEl.innerHTML += `
        <div class="message">
          <div class="bubble-label">Error</div>
          <div class="bubble answer" style="color:var(--error)">${escapeHtml(e.message)}</div>
        </div>`;
    }

    chatEl.scrollTop = chatEl.scrollHeight;
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Init
  updateDocCount();
</script>
</body>
</html>
